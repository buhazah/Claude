name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]
  push:
    branches: [main]
    paths:
      - '.github/workflows/eas-build.yml'
      - 'ember/**'

jobs:
  # Diagnostic: compile the Android project on the runner to surface the real
  # Gradle error (EAS only reports "unknown error"). Runs on every push.
  gradle-diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ember
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://bauosctmdwumvuvyoemd.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Gradle assembleDebug (full error output)
        run: cd android && ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://bauosctmdwumvuvyoemd.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
